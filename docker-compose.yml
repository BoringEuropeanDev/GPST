version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://gpst:gpst_pass@db:5432/stockterminal
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY:-demo}
      - NEWS_API_KEY=${NEWS_API_KEY:-}
      - FRED_API_KEY=${FRED_API_KEY:-}
      - MEDIASTACK_KEY=${MEDIASTACK_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=gpst
      - POSTGRES_PASSWORD=gpst_pass
      - POSTGRES_DB=stockterminal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpst -d stockterminal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
